services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kestra"]
      interval: 5s
      timeout: 5s
      retries: 10

  kestra:
    image: kestra/kestra:latest
    restart: always
    pull_policy: always
    user: "0:0"  # root needed to mount + write to host Obsidian path
    command: server standalone
    environment:
      # Deterministic basic-auth credentials so kestractl + curl work headlessly.
      # Override these in .env if you want.
      KESTRA_SECURITY_BASIC_AUTH_ENABLED: "true"
      KESTRA_SECURITY_BASIC_AUTH_USERNAME: "admin@kestra.local"
      KESTRA_SECURITY_BASIC_AUTH_PASSWORD: "Hackathon2026!"
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          security:
            basic-auth:
              enabled: true
              username: admin@kestra.local
              password: Hackathon2026!
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
          # In-container URL — Kestra calls itself on 8080 from inside the container.
          # The host UI is on 18080 (port mapping); this URL is what subflow lookups use.
          url: http://localhost:8080/
    ports:
      - "18080:8080"
      - "18081:8081"
    volumes:
      - ./flows:/app/flows:ro
      - ./scripts:/app/scripts:ro
      - kestra-storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ${OBSIDIAN_VAULT_PATH}:/obsidian
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  kestra-storage:
